<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        #display {
            width: 100%;
            height: 50px;
            font-size: 22px;
            text-align: right;
            margin-bottom: 10px;
            padding: 5px;
        }


        <div class="calculator" > <input type="text" id="display" disabled > <div class="buttons" > <button onclick="clearDisplay()" > C</button > <button onclick="append('/')" > /</button > <button onclick="append('*')" > *</button > <button onclick="append('-')" > -</button > <button onclick="append('7')" > 7</button > <button onclick="append('8')" > 8</button > <button onclick="append('9')" > 9</button > <button onclick="append('+')" > + </button > <button onclick="append('4')" > 4</button > <button onclick="append('5')" > 5</button > <button onclick="append('6')" > 6</button > <button onclick="calculate()" > =</button > <button onclick="append('1')" > 1</button > <button onclick="append('2')" > 2</button > <button onclick="append('3')" > 3</button > <button class="zero" onclick="append('0')" > 0</button > </div > </div > <script > let display = document.getElementById("display"); function append(value) {
            display .value += value;
        }

        function clearDisplay() {
            display .value = "";
        }

        function calculate() {
            try;

        {
            display .value = eval(display.value);
        }

        catch {
            display .value = "Error";
        }

        }
        </script > </body > </html >
